[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10

decorations = "Buttonless"
startup_mode = "Fullscreen"

opacity = 0.8
blur = true


[cursor]
style = "Underline"
thickness = 0.3
vi_mode_style = "Block"

[font]
size = 12.0

